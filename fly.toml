app = "kairos-api"
primary_region = "gru"    # São Paulo — mais perto de vocês

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  GOTOOLCHAIN = "local"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    soft_limit = 100
    hard_limit = 200

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
